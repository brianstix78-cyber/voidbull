<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Void Bull | Charge Beyond Darkness</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#050505;
color:white;
font-family:'Space Grotesk',sans-serif;
overflow-x:hidden;
}

.hero{

height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;

background:
radial-gradient(circle at center,#111 0%,#050505 65%);
}

.logo{

width:170px;
height:170px;
border-radius:50%;
margin-bottom:30px;
box-shadow:0 0 40px #00ff66;

}

h1{

font-family:'Bebas Neue',sans-serif;
font-size:90px;
letter-spacing:5px;
color:#00ff66;

}

.tag{

font-size:24px;
margin-top:10px;
opacity:.9;

}

.desc{

margin-top:30px;
max-width:650px;
font-size:18px;
line-height:1.8;
color:#cccccc;

}

.buttons{

margin-top:45px;

display:flex;

gap:20px;

flex-wrap:wrap;

justify-content:center;

}

.btn{

padding:18px 42px;

background:#00ff66;

color:black;

text-decoration:none;

border-radius:50px;

font-weight:bold;

transition:.3s;

}

.btn:hover{

transform:translateY(-4px);

box-shadow:0 0 25px #00ff66;

}

.btn2{

background:transparent;

border:2px solid #00ff66;

color:#00ff66;

}

footer{

padding:50px;

text-align:center;

color:#777;

}

@media(max-width:768px){

h1{

font-size:55px;

}

.tag{

font-size:18px;

}

.logo{

width:130px;
height:130px;

}

}

</style>

</head>

<body>

<section class="hero">

<img src="https://i.imgur.com/Ou6QwVQ.png" class="logo">

<h1>VOID BULL</h1>

<div class="tag">

Charge Beyond Darkness

</div>

<div class="desc">

Born from the Void.
Built by the Community.

Void Bull is a Solana meme coin created for those who never stop charging forward.

No fear.
No limits.
Only momentum.

</div>

<div class="buttons">

<a href="#" class="btn">

BUY $VOID

</a>

<a href="#" class="btn btn2">

JOIN COMMUNITY

</a>

</div>

</section>

<footer>

© 2026 VOID BULL • Built on Solana

</footer>

</body>
</html>
